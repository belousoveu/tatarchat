databaseChangeLog:
  - changeSet:
      id: 12
      author: e.belousov
      changes:
        - createSequence:
            sequenceName: attachments_seq
            startValue: 1000

        - createTable:
            tableName: attachments
            remarks: "Вложения к сообщениям"
            columns:
              - column:
                  name: id
                  type: BIGINT
                  defaultValueSequenceNext: attachments_seq
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: message_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: file_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: file_url
                  type: VARCHAR(1024)
                  constraints:
                    nullable: false
                  remarks: "Ссылка на файл (локальный путь или S3)"
              - column:
                  name: file_size
                  type: BIGINT
                  remarks: "Размер в байтах"
              - column:
                  name: mime_type
                  type: VARCHAR(100)
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP