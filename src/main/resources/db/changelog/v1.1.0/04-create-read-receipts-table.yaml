databaseChangeLog:
  - changeSet:
      id: 14
      author: e.belousov
      changes:
        - createTable:
            tableName: read_receipts
            remarks: "Статусы прочтения сообщений"
            columns:
              - column:
                  name: message_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: read_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP

        - addPrimaryKey:
            tableName: read_receipts
            columnNames: message_id, user_id
            constraintName: pk_read_receipts