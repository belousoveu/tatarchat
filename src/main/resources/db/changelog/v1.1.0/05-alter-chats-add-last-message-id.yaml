databaseChangeLog:
  - changeSet:
      id: 15
      author: e.belousov
      changes:
        - addColumn:
            tableName: chats
            columns:
              - column:
                  name: last_message_id
                  type: BIGINT
                  remarks: "Ссылка на последнее сообщение в чате"

        - addForeignKeyConstraint:
            baseTableName: chats
            baseColumnNames: last_message_id
            referencedTableName: messages
            referencedColumnNames: id
            constraintName: fk_chats_last_message
            onDelete: SET NULL