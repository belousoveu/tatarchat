databaseChangeLog:
  - changeSet:
      id: 13
      author: e.belousov
      changes:
        - createSequence:
            sequenceName: reactions_seq
            startValue: 1000

        - createTable:
            tableName: reactions
            remarks: "Реакции на сообщения"
            columns:
              - column:
                  name: id
                  type: BIGINT
                  defaultValueSequenceNext: reactions_seq
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: message_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: emoji
                  type: VARCHAR(10)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP

        - addUniqueConstraint:
            tableName: reactions
            columnNames: message_id, user_id, emoji
            constraintName: uk_reactions_unique