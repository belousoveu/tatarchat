databaseChangeLog:
  - changeSet:
      id: 4
      author: e.belousov
      changes:
        - createSequence:
            sequenceName: chats_seq
            startValue: 1000

        - createTable:
            tableName: chats
            remarks: "Чаты (личные и групповые)"
            columns:
              - column:
                  name: id
                  type: BIGINT
                  defaultValueSequenceNext: chats_seq
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: chat_type
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
                  remarks: "PRIVATE или GROUP"
              - column:
                  name: name
                  type: VARCHAR(100)
                  remarks: "Название группы (для PRIVATE может быть NULL)"
              - column:
                  name: created_by_user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP

        - addForeignKeyConstraint:
            baseTableName: chats
            baseColumnNames: created_by_user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_chats_created_by
            onDelete: RESTRICT