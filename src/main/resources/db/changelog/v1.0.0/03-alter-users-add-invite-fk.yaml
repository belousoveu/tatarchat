databaseChangeLog:
  - changeSet:
      id: 3
      author: e.belousov
      changes:
        - addForeignKeyConstraint:
            baseTableName: users
            baseColumnNames: invite_code_id
            referencedTableName: invite_codes
            referencedColumnNames: id
            constraintName: fk_users_invite_code
            onDelete: SET NULL

        - addForeignKeyConstraint:
            baseTableName: invite_codes
            baseColumnNames: created_by_user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_invite_created_by
            onDelete: CASCADE