databaseChangeLog:
  - changeSet:
      id: 6
      author: e.belousov
      changes:
        - createTable:
            tableName: message_edits
            remarks: "Правки текста сообщений (оригинал в почте)"
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: email_message_id
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                  remarks: "Message-ID письма в Gmail"
              - column:
                  name: chat_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: edited_by_user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: new_text
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: edited_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP

        - createIndex:
            indexName: idx_message_edits_email_id
            tableName: message_edits
            columns:
              - column:
                  name: email_message_id

        - addForeignKeyConstraint:
            baseTableName: message_edits
            baseColumnNames: chat_id
            referencedTableName: chats
            referencedColumnNames: id
            constraintName: fk_edits_chat
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: message_edits
            baseColumnNames: edited_by_user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_edits_user
            onDelete: RESTRICT