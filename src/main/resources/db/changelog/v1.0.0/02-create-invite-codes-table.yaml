databaseChangeLog:
  - changeSet:
      id: 2
      author: e.belousov
      changes:
        - createSequence:
            sequenceName: invite_codes_seq
            startValue: 100
            incrementBy: 1

        - createTable:
            tableName: invite_codes
            remarks: "Инвайт-коды для регистрации"
            columns:
              - column:
                  name: id
                  type: BIGINT
                  defaultValueSequenceNext: invite_codes_seq
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: code
                  type: VARCHAR(64)
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: created_by_user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: max_uses
                  type: INT
              - column:
                  name: uses_remaining
                  type: INT
              - column:
                  name: expires_at
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP

        - createIndex:
            indexName: idx_invite_codes_code
            tableName: invite_codes
            columns:
              - column:
                  name: code