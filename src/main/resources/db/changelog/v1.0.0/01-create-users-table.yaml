# src/main/resources/db/changelog/v1.0.0/01-create-users-table.yaml
databaseChangeLog:
  - changeSet:
      id: 1
      author: e.belousov
      changes:
        - createSequence:
            sequenceName: users_seq
            startValue: 1000
            incrementBy: 1

        - createTable:
            tableName: users
            remarks: "Таблица зарегистрированных пользователей"
            columns:
              - column:
                  name: id
                  type: BIGINT
                  defaultValueSequenceNext: users_seq
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: password_hash
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: display_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: avatar_url
                  type: VARCHAR(1024)
              - column:
                  name: role
                  type: VARCHAR(20)
                  defaultValue: "ROLE_USER"
                  constraints:
                    nullable: false
              - column:
                  name: is_enabled
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: invite_code_id
                  type: BIGINT
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP

        - createIndex:
            indexName: idx_users_email
            tableName: users
            columns:
              - column:
                  name: email