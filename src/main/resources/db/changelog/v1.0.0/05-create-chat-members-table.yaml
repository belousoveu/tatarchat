databaseChangeLog:
  - changeSet:
      id: 5
      author: e.belousov
      changes:
        - createTable:
            tableName: chat_members
            remarks: "Участники чатов"
            columns:
              - column:
                  name: chat_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: joined_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: is_admin
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

        - addPrimaryKey:
            tableName: chat_members
            columnNames: chat_id, user_id
            constraintName: pk_chat_members

        - addForeignKeyConstraint:
            baseTableName: chat_members
            baseColumnNames: chat_id
            referencedTableName: chats
            referencedColumnNames: id
            constraintName: fk_chat_members_chat
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: chat_members
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_chat_members_user
            onDelete: CASCADE

        - createIndex:
            indexName: idx_chat_members_user
            tableName: chat_members
            columns:
              - column:
                  name: user_id