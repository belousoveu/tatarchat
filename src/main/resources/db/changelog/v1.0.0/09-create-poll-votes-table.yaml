databaseChangeLog:
  - changeSet:
      id: 9
      author: e.belousov
      changes:
        - createTable:
            tableName: poll_votes
            remarks: "Голоса пользователей"
            columns:
              - column:
                  name: poll_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: option_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: voted_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP

        - addPrimaryKey:
            tableName: poll_votes
            columnNames: poll_id, user_id
            constraintName: pk_poll_votes

        - addForeignKeyConstraint:
            baseTableName: poll_votes
            baseColumnNames: poll_id
            referencedTableName: polls
            referencedColumnNames: id
            constraintName: fk_votes_poll
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: poll_votes
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_votes_user
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: poll_votes
            baseColumnNames: option_id
            referencedTableName: poll_options
            referencedColumnNames: id
            constraintName: fk_votes_option
            onDelete: CASCADE

        - createIndex:
            indexName: idx_poll_votes_user
            tableName: poll_votes
            columns:
              - column:
                  name: user_id